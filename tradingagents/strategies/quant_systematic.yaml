name: quant_systematic
description: >
  Greatest weight on deterministic metrics; should choose NO_TRADE frequently.
analyst_weights:
  market_structure: 1.5
  derivatives: 1.3
  sentiment: 0.4
  catalyst: 0.4
  regime: 1.4
prompt_overlay: >
  Rely primarily on calculated technicals, order-book metrics, funding and
  regime outputs. Narratives are secondary. Default to NO_TRADE unless multiple
  deterministic signals align with clear R:R and narrow spread.
preferred_time_horizon: 1h
minimum_confidence: 0.65
max_position_pct: 6.0
max_leverage: 2.0
risk_per_trade_pct: 0.6
