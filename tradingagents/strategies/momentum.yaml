name: momentum
description: >
  Favors trend continuation, volume expansion and alignment across timeframes.
analyst_weights:
  market_structure: 1.4
  derivatives: 0.9
  sentiment: 0.8
  catalyst: 0.7
  regime: 1.2
prompt_overlay: >
  Favor trades that continue an established trend with rising volume and
  supportive regime. Avoid fading strong momentum. Prefer breakouts with
  clean stops beneath structure. Prefer NO_TRADE in choppy ranges.
preferred_time_horizon: 1h
minimum_confidence: 0.58
max_position_pct: 10.0
max_leverage: 3.0
risk_per_trade_pct: 1.0
