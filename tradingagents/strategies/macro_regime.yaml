name: macro_regime
description: >
  Trades only when market regime and directional thesis clearly align.
analyst_weights:
  market_structure: 1.0
  derivatives: 0.9
  sentiment: 0.8
  catalyst: 1.0
  regime: 1.7
prompt_overlay: >
  Require regime alignment (trend, volatility, risk_on/off) with the directional
  thesis before trading. Prefer standing aside in conflicting regimes. Size
  conservatively when volatility is high or extreme.
preferred_time_horizon: 4h
minimum_confidence: 0.62
max_position_pct: 8.0
max_leverage: 2.5
risk_per_trade_pct: 0.75
